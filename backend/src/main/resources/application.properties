spring.application.name=annimemo

# Loads .env when present (key=value format).
# Supports running from either backend/ or workspace root.
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

# Default runtime uses PostgreSQL (e.g., Supabase).
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool configuration (HikariCP)
# Session Pooler has client limits, so keep pool size small.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=false

# Bind port dynamically for cloud environments (like Render), falling back to 8080 locally
server.port=${PORT:8080}
